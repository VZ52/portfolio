# GitHub Actions workflow: автоматический деплой на GitHub Pages.
# Триггерится на каждый push в main. Подходит для статических сайтов без сборки.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # позволяет запустить вручную с UI

# Разрешения, которые нужны для деплоя на Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Только один деплой одновременно, в очереди отменяются
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload как Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
